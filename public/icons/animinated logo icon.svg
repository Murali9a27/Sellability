<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="60" viewBox="0 0 80 60">
  <defs>
    <style>
      .b1 { transform-origin: 13px 60px; animation: p 1.4s ease-in-out 0.00s infinite; }
      .b2 { transform-origin: 35px 60px; animation: p 1.4s ease-in-out 0.18s infinite; }
      .b3 { transform-origin: 57px 60px; animation: p 1.4s ease-in-out 0.36s infinite; }
      @keyframes p {
        0%   { transform: scaleY(0.5); }
        40%  { transform: scaleY(1);   }
        70%  { transform: scaleY(0.75); }
        100% { transform: scaleY(0.5); }
      }
    </style>
  </defs>
  <rect class="b1" x="14" y="42" width="15" height="18" fill="#D83A27"></rect>
  <rect class="b2" x="32" y="28" width="15" height="32" fill="#D83A27"></rect>
  <rect class="b3" x="50" y="2" width="15" height="58" fill="#D83A27"></rect>
</svg>
